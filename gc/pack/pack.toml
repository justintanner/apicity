# Apicity — Gas City pack.

[pack]
name = "apicity"
schema = 1

[[agent]]
name = "worker"
prompt_template = "prompts/worker.md"
nudge = "Check for open beads. Pick one up and do the work, using CLAUDE.md as your guide."
session_setup = [
    "{{.ConfigDir}}/scripts/op-check.sh {{.RigRoot}}",
]
max_active_sessions = 3
